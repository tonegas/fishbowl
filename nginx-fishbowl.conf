# Nginx configuration for Fishbowl at tonegas.it/fishbowl
#
# SETUP:
# 1. Add the location blocks below inside your server { } block for tonegas.it
#    (e.g. in /etc/nginx/sites-available/tonegas.it or /etc/nginx/conf.d/tonegas.conf)
#
# 2. Run Fishbowl on port 9999 (e.g. with pm2 or systemd):
#    cd /path/to/fishbowl && node fish_server.js 9999
#
# 3. Test and reload nginx:
#    sudo nginx -t && sudo systemctl reload nginx
#
# URL: https://tonegas.it/fishbowl  or  https://tonegas.it/fishbowl/www/fish.html

    # Redirect /fishbowl and /fishbowl/ to the game
    location = /fishbowl {
        return 301 /fishbowl/www/fish.html;
    }
    location = /fishbowl/ {
        return 301 /fishbowl/www/fish.html;
    }

    # Proxy all /fishbowl/* to Node.js
    # Node server expects /fish.html, /media/... (it prepends /www internally)
    location /fishbowl/ {
        rewrite ^/fishbowl/socket.io(.*)$ /socket.io$1 break;
        rewrite ^/fishbowl/www/?(.*)$ /$1 break;
        rewrite ^/fishbowl(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:9999;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for Socket.IO
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

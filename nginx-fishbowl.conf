# Nginx configuration for Fishbowl at tonegas.it/fishbowl
#
# Aggiungi upstream FUORI dal server {} (a livello root del file):
#   upstream fishbowl { server 127.0.0.1:9999; }
#
# Poi aggiungi queste location DENTRO server { } (prima di location /):

# CRUCIALE: Proxy /socket.io/ - altrimenti le richieste vanno al sito principale
# se il client usa path predefinito. Questo le inoltra al server Node.
location /socket.io/ {
    proxy_pass http://fishbowl;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 86400;
}

# Redirect /fishbowl e /fishbowl/ al gioco
location = /fishbowl {
    return 301 /fishbowl/www/fish.html;
}
location = /fishbowl/ {
    return 301 /fishbowl/www/fish.html;
}

# Proxy /fishbowl/* al server Node
location /fishbowl/ {
    rewrite ^/fishbowl/socket.io(.*)$ /socket.io$1 break;
    rewrite ^/fishbowl/www/?(.*)$ /$1 break;
    rewrite ^/fishbowl(/.*)$ $1 break;
    proxy_pass http://fishbowl;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 86400;
}

# Esempio di configurazione completa per tonegas.it con Fishbowl
# Sostituisci il contenuto del tuo server block con questo

# IP/porta del server Node Fishbowl
upstream fishbowl {
    server 127.0.0.1:9999;
}

server {
    listen 80;
    server_name tonegas.dii.unitn.it tonegas.it tonegas.com www.tonegas.it www.tonegas.com;
    
    index index.html index.htm;
    root /home/tonegas/tonegas.it/www/;

    location /media/ {
        root /home/tonegas/tonegas.it/www/;
    }

    # Fishbowl - gioco Node.js su tonegas.it/fishbowl
    location = /fishbowl {
        return 301 /fishbowl/www/fish.html;
    }
    location = /fishbowl/ {
        return 301 /fishbowl/www/fish.html;
    }
    location /fishbowl/ {
        rewrite ^/fishbowl/socket.io(.*)$ /socket.io$1 break;
        rewrite ^/fishbowl/www/?(.*)$ /$1 break;
        rewrite ^/fishbowl(/.*)$ $1 break;
        proxy_pass http://fishbowl;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

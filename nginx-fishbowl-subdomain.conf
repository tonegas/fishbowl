# Fishbowl su sottodominio dedicato: https://fishbowl.tonegas.it
#
# DNS: record A (o AAAA) fishbowl.tonegas.it -> stesso IP del server.
#
# Installazione tipica (Debian/Ubuntu):
#   sudo cp nginx-fishbowl-subdomain.conf /etc/nginx/sites-available/fishbowl.tonegas.it
#   sudo ln -s /etc/nginx/sites-available/fishbowl.tonegas.it /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Il sito principale (tonegas.it) NON va modificato se server_name è una lista
# esplicita senza fishbowl.tonegas.it: nginx sceglie il server in base all'header Host.
# Aggiungi questo file come secondo server { } (stesso http { } del resto).
#
# Se hai già definito `upstream fishbowl { ... }` in un altro file incluso da nginx,
# puoi sostituire `http://fishbowl_node` con `http://fishbowl` e cancellare l'upstream qui sotto.

upstream fishbowl_node {
    server 127.0.0.1:9999;
}

# HTTP (redirect a HTTPS in produzione — decommenta dopo certbot)
server {
    listen 80;
    listen [::]:80;
    server_name fishbowl.tonegas.it;

    # Con certificato Let's Encrypt, certbot aggiunge spesso da solo il return 301 verso https.
    # location /.well-known/acme-challenge/ { root /var/www/html; }

    location / {
        proxy_pass http://fishbowl_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_buffering off;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
    }
}

# Dopo: sudo certbot --nginx -d fishbowl.tonegas.it
# Certbot aggiungerà un blocco listen 443 ssl e le righe ssl_certificate.

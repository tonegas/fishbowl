<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        #nameOverlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); display:flex; align-items:center; justify-content:center; z-index:1000; }
        #nameOverlay .name-box { padding:16px 24px; background:rgba(0,0,0,0.6); border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); box-sizing:border-box; }
        #nameOverlay input { font:16px Arial,sans-serif; padding:8px 12px; background:transparent; border:none; color:rgba(255,255,255,0.95); width:160px; text-align:center; }
        #nameOverlay input::placeholder { color:rgba(255,255,255,0.95); opacity:0.7; }
        #nameOverlay input:focus { outline:none; }
        #nameError { color:#ff6b6b; font:14px Arial,sans-serif; margin-top:8px; text-align:center; line-height:1.2; }
        #leaderboardOverlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:1001; }
        #leaderboardOverlay h2 { color:#fff; font:bold 24px Arial,sans-serif; margin-bottom:20px; }
        #leaderboardList { color:#fff; font:bold 24px Arial,sans-serif; list-style:none; padding:0; margin:0 0 25px 0; max-height:60vh; overflow-y:auto; width:400px; }
        #leaderboardList li { padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.2); display:table; width:99%; box-sizing:border-box; table-layout:fixed; }
        #leaderboardList li .rank { display:table-cell; width:40px; vertical-align:middle; }
        #leaderboardList li .name { display:table-cell; overflow:hidden; text-overflow:ellipsis; vertical-align:middle; }
        #leaderboardList li .weight { display:table-cell; width:85px; text-align:right; vertical-align:middle; white-space:nowrap; }
        #leaderboardList li.separator { display:block; text-align:center; padding:4px 0; color:rgba(255,255,255,0.6); }
        #playAgainBtn { font-size:20px; padding:12px 30px; background:rgba(100,200,100,0.8); border:none; color:#fff; border-radius:8px; cursor:pointer; }
        #playAgainBtn:hover { background:rgba(100,200,100,1); }
        #tutorialOverlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:999; pointer-events:none; opacity:0; transition:opacity 1.2s ease-in; }
        #tutorialOverlay.visible { opacity:1; }
        #tutorialOverlay .tutorial-box { text-align:center; padding:30px 50px; background:rgba(0,0,0,0.6); border-radius:12px; max-width:400px; }
        #tutorialOverlay .tutorial-box p { color:rgba(255,255,255,0.95); font:18px Arial,sans-serif; margin:0 0 20px 0; line-height:1.5; }
        #tutorialOverlay .tutorial-box .arrow-pad { display:flex; flex-direction:column; align-items:center; margin-top:15px; }
        #tutorialOverlay .tutorial-box .key-row { display:flex; justify-content:center; align-items:center; gap:8px; }
        #tutorialOverlay .tutorial-box .key-row-up { margin-bottom:6px; }
        #tutorialOverlay .tutorial-box .key { padding:8px 14px; background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.5); border-radius:6px; color:#fff; font:bold 16px Arial,sans-serif; min-width:44px; text-align:center; }
        #tutorialOverlay .tutorial-box .key-blink-left { animation:keyblink 0.8s ease-in-out infinite; }
        #tutorialOverlay .tutorial-box .key-blink-right { animation:keyblink 0.8s ease-in-out 0.4s infinite; }
        @keyframes keyblink { 0%, 100% { opacity:1; box-shadow:0 0 8px rgba(255,255,255,0.5); } 50% { opacity:0.5; box-shadow:0 0 4px rgba(255,255,255,0.3); } }
        #debugPanel { position:fixed; top:8px; left:8px; padding:8px 12px; background:rgba(0,0,0,0.7); border-radius:6px; color:#7f7; font:12px monospace; z-index:998; display:none; pointer-events:none; }
    </style>
    <script type="text/javascript" src="../socket.io/socket.io.js"></script>
    <script type="text/javascript" src="media/lib/jquery-2.1.0.min.js"></script>
    <script type="text/javascript" src="media/lib/createjs-2013.12.12.min.js"></script>
    <script type="text/javascript" src="media/lib/lodash-2.4.1.min.js"></script>
    <script type="text/javascript" src="media/lib/kibo.js"></script>
    <script type="text/javascript" src="media/js/config.js"></script>
    <script type="text/javascript" src="media/js/socket.js"></script>
    <script type="text/javascript" src="media/js/entities/lake.js"></script>
    <script type="text/javascript" src="media/js/entities/waterSurface.js"></script>
    <script type="text/javascript" src="media/js/entities/lakeBorder.js"></script>
    <script type="text/javascript" src="media/js/entities/algae.js"></script>
    <script type="text/javascript" src="media/js/entities/food.js"></script>
    <script type="text/javascript" src="media/js/entities/fish.js"></script>
    <script type="text/javascript" src="media/js/ui.js"></script>
    <script type="text/javascript" src="media/js/network.js"></script>
    <script type="text/javascript" src="media/js/game.js"></script>
    <script type="text/javascript" src="media/js/main.js"></script>
    </head>
    <body style="margin:0;padding:0;overflow:hidden;">
	<canvas id="Lake" width="800" height="800" style="display:block;"></canvas>
	<div id="nameOverlay">
		<div class="name-box">
			<input type="text" id="playerNameInput" placeholder="Fish Name" maxlength="12" autocomplete="off" />
			<div id="nameError"></div>
		</div>
	</div>
	<div id="leaderboardOverlay">
		<h2>Leaderboard</h2>
		<ul id="leaderboardList"></ul>
		<button id="playAgainBtn">Play Again</button>
	</div>
	<div id="debugPanel"></div>
	<div id="tutorialOverlay">
		<div class="tutorial-box">
			<p>Eat to survive and Avoid bigger fish.</p>
            <p>Use ← → to move.</p>
			<div class="arrow-pad">
				<div class="key-row key-row-up">
					<span class="key">↑</span>
				</div>
				<div class="key-row key-row-middle">
					<span class="key key-blink-left">←</span>
					<span class="key">↓</span>
					<span class="key key-blink-right">→</span>
				</div>
			</div>
            <br>
            <p>Use ↑ to swim faster, ↓ to swim slower.</p>
		</div>
	</div>
    </body>
</html>
